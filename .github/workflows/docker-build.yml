name: Docker Hub Release (from fork source)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit
        id: commit
        run: echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push (official Action Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: install/docker/Dockerfile.Action
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/riscv64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/v2raya:latest
            ${{ secrets.DOCKER_USERNAME }}/v2raya:commit-${{ steps.commit.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
